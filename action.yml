name: 'MigrateGuard'
description: 'AI-powered review of database migrations on every PR. Like a senior DBA commenting your PR — in 1 click, no YAML config.'
author: 'Sébastien Gonin'
branding:
  icon: 'database'
  color: 'orange'

inputs:
  github-token:
    description: 'GitHub token used to read the PR and post the review comment.'
    required: true
  anthropic-api-key:
    description: 'Anthropic API key used to call Claude. Store as a repository secret.'
    required: true
  model:
    description: 'Claude model to use for the review.'
    required: false
    default: 'claude-sonnet-4-5-20250929'
  migrations-path:
    description: 'Path to the migrations folder, relative to repo root.'
    required: false
    default: 'prisma/migrations'

runs:
  using: 'node20'
  main: 'dist/index.js'
